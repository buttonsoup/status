owner: buttonsoup
repo: status

sites:
  - name: Application
    url: https://rifthub.app/up
    icon: https://rifthub.app/icon.svg
  - name: RiftHub
    url: https://rifthub.app
    icon: https://rifthub.app/icon.svg

status-website:
  cname: status.rifthub.app
  logoUrl: https://rifthub.app/icon.svg
  faviconSvg: https://rifthub.app/icon.svg
  name: RiftHub Status
  theme: dark
  themeUrl: https://status.rifthub.app/rifthub-theme.css
  introTitle: Card collection tracker & community tools
  introMessage: Real-time uptime for [RiftHub](https://rifthub.app) production.
  navbar:
    - title: Status
      href: /
    - title: RiftHub
      href: https://rifthub.app
  metaTags:
    - name: color-scheme
      content: dark
    - name: theme-color
      content: "#0a0a0a"
  css: |
    html { color-scheme: dark; }
    header h1 { color: #D7A63F !important; }

i18n:
  liveStatus: Live status
  allSystemsOperational: All systems operational
  someSystemsNotOperational: Some systems are experiencing issues
  allSystemsNotOperational: All systems are down
  uptimeStatusOverPeriodText: Uptime over the last 90 days
  incidentHistory: Incident history
